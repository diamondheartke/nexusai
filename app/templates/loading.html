{% extends "base.html" %}

{% block title %}Nexusai | Initializing Platform...{% endblock %}

{% block head %}
<style>
    @keyframes sliderProgress {
        0% { left: -100%; }
        50% { left: 0%; }
        100% { left: 100%; }
    }
    .animate-slider {
        animation: sliderProgress 3s infinite ease-in-out;
    }
</style>
{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-screen bg-[#0b0c10] px-4">
    
    <div class="flex flex-col items-center justify-center w-full max-w-3xl p-6 transition-all duration-1000 animate-fade-in">
        
        <div class="w-full mb-10 flex justify-center">
            <img src="{{ url_for('static', filename='images/nexusai_logo.png') }}" 
                 alt="Nexusai Logo" 
                 class="w-full max-w-2xl h-auto rounded-xl object-contain shadow-[0_0_50px_rgba(59,130,246,0.2)] border border-slate-800/60">
        </div>
        
        <div class="w-[320px] h-[3px] bg-white/10 rounded-full overflow-hidden relative">
            <div class="absolute top-0 h-full w-full bg-gradient-to-r from-cyan-500 via-blue-500 to-indigo-600 shadow-[0_0_12px_#3b82f6] left-[-100%] animate-slider"></div>
        </div>

    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        setTimeout(function() {
            window.location.href = "{{ url_for('main.home') }}";
        }, 3200);
    });
</script>
{% endblock %}
